# Development override: run the Vite dev server (hot reload) instead of the
# production nginx build, mount source for live editing, and expose the API on
# the host for direct access.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# The web dev server still listens on 8080, so it stays reachable at
# http://localhost:${WEB_PORT:-8080} just like production.
services:
  api:
    command: ["node", "--watch", "src/index.js"]
    ports:
      - "${API_PORT:-3000}:3000"
    volumes:
      - ./api/src:/app/src

  web:
    build:
      target: dev
    environment:
      # Vite proxies /api to the api service (see web/vite.config.js).
      API_TARGET: http://api:3000
    volumes:
      - ./web:/app
      - /app/node_modules
