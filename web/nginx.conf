# Serves the built SPA and reverse-proxies the API so the browser only ever
# talks to this container. Listens on 8080 to run as a non-root user.
server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy API calls to the api service. The /api prefix is preserved,
    # matching the routes mounted in api/src/index.js. X-Forwarded-* lets the
    # API (app.set('trust proxy')) see the original scheme/IP so Secure cookies
    # and rate limiting work behind TLS.
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback: unknown paths return index.html so React Router deep links
    # (e.g. /transactions) resolve on a full page load.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
