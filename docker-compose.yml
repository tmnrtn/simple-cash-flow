# End-user stack: pulls the published images from GHCR and runs them.
#   cp .env.example .env  &&  docker compose up -d
# Override IMAGE_TAG in .env to pin a version (default: latest).
#
# To build from source instead, layer the build override:
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
# For a hot-reload dev environment:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cashflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      # Required — no default. Set POSTGRES_PASSWORD in .env (see .env.example).
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Schema is managed by the API (migrations on startup), not initdb scripts.
    # Not published to the host — only reachable by other services on the network.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-cashflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/tmnrtn/simple-cash-flow-api:${IMAGE_TAG:-latest}
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-cashflow}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set (see .env.example)}
      PORT: 3000
      # Authentication (see .env.example). Auth is ON by default: set
      # AUTH_PASSWORD and AUTH_SECRET, or AUTH_DISABLED=true for trusted LANs.
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
      # Seed a fictional demo dataset on a fresh (empty) database.
      DEMO_DATA: ${DEMO_DATA:-false}
    # Not published to the host — the web container reverse-proxies /api to it.
    # Use docker-compose.dev.yml to expose it for direct access during development.
    healthcheck:
      test:
        ["CMD", "node", "-e",
         "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      db:
        condition: service_healthy

  web:
    image: ghcr.io/tmnrtn/simple-cash-flow-web:${IMAGE_TAG:-latest}
    ports:
      - "${WEB_PORT:-8080}:8080"
    healthcheck:
      # 127.0.0.1, not localhost: nginx listens on IPv4 only and localhost
      # resolves to ::1 first inside the container.
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8080/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
