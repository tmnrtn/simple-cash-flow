services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cashflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Set to true to seed a fictional demo dataset on first boot.
      DEMO_DATA: ${DEMO_DATA:-false}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Numeric prefixes control init order: schema first, then optional demo seed.
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./db/demo-seed.sh:/docker-entrypoint-initdb.d/02-demo-seed.sh
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: ./api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: cashflow
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: ${API_PORT:-3000}
      # Authentication (see .env.example). Auth is ON by default: set
      # AUTH_PASSWORD and AUTH_SECRET, or AUTH_DISABLED=true for trusted LANs.
      AUTH_DISABLED: ${AUTH_DISABLED:-false}
      AUTH_USERNAME: ${AUTH_USERNAME:-admin}
      AUTH_PASSWORD: ${AUTH_PASSWORD:-}
      AUTH_PASSWORD_HASH: ${AUTH_PASSWORD_HASH:-}
      AUTH_SECRET: ${AUTH_SECRET:-}
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    depends_on:
      db:
        condition: service_healthy

  web:
    build: ./web
    environment:
      API_TARGET: http://api:${API_PORT:-3000}
    ports:
      - "${WEB_PORT:-5173}:5173"
    depends_on:
      - api

volumes:
  postgres_data:
