name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  api:
    name: API — lint, format, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      # Integration tests use testcontainers, which needs the Docker daemon
      # (available by default on GitHub-hosted ubuntu runners).
      - run: npm test

  web:
    name: Web — lint, format, test, build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      # compose interpolates the file before building; POSTGRES_PASSWORD is a
      # required variable, so provide a throwaway value for the build.
      - name: Build all images from source
        run: docker compose -f docker-compose.yml -f docker-compose.build.yml build
        env:
          POSTGRES_PASSWORD: ci
